<style>
  :root {
    /* Light theme — warm off-white + deep ink */
    --bg: #f6f5f0;
    --bg-elev: #ffffff;
    --bg-card: #fbfaf6;
    --line: #e7e4dc;
    --line-2: #d4d0c5;
    --ink: #14160f;
    --ink-2: #5b5e54;
    --ink-3: #8a8d82;
    --accent: #2f7a3f;
    --accent-rgb: 47,122,63;
    --accent-fg: #ffffff;
    --accent-2: #1f6b6b;
    --warn: #c87a3c;
    --danger: #c0413c;
    --grid: rgba(20,22,15,0.04);
  }
  :root[data-theme="dark"] {
    --bg: #0b0d0c;
    --bg-elev: #111413;
    --bg-card: #141816;
    --line: #1f2422;
    --line-2: #2a302d;
    --ink: #e9ece9;
    --ink-2: #a8b0ac;
    --ink-3: #6f7773;
    --accent: #b9ff66;
    --accent-rgb: 185,255,102;
    --accent-fg: #0b0d0c;
    --accent-2: #7de2c0;
    --warn: #f0a868;
    --danger: #ff6b6b;
    --grid: rgba(255,255,255,0.04);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow-x: hidden;
  }

  ::selection { background: var(--accent); color: var(--accent-fg); }

  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: "zero"; }
  .display { font-family: 'Fraunces', 'Inter', serif; letter-spacing: -0.02em; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* Background grid */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at top, rgba(0,0,0,0.5) 0%, transparent 70%);
  }

  #app { position: relative; z-index: 1; }

  /* Layout container */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }

  @media (max-width: 720px) {
    .container { padding: 0 20px; }
  }

  /* Section heading label */
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 24px;
  }
  .section-label .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    border-radius: 999px;
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--ink);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
  }
  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover {
    background: transparent;
    color: var(--accent);
    box-shadow: 0 0 0 4px rgba(var(--accent-rgb),0.15);
  }

  /* Card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .reveal { opacity: 0; transform: translateY(24px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }
</style>
