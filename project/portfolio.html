<style>
  :root {
    --bg: #f4f3ee;
    --paper: #ffffff;
    --ink: #0a0a0a;
    --ink-2: #4a4a48;
    --ink-3: #8b8b88;
    --line: #d8d6cd;
    --line-2: #b8b6ad;
    --accent: #1f3aff;          /* cobalt */
    --accent-fg: #ffffff;
    --accent-rgb: 31,58,255;
    --chart: #1f3aff;
    --pill-bg: #0a0a0a;
    --pill-fg: #ffffff;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow-x: hidden;
  }

  ::selection { background: var(--accent); color: var(--accent-fg); }

  .mono { font-family: 'JetBrains Mono', monospace; }
  .display { font-family: 'Archivo Black', 'Inter', sans-serif; letter-spacing: -0.02em; font-weight: 900; }
  .grotesk { font-family: 'Space Grotesk', sans-serif; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  .container {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 28px;
  }
  @media (max-width: 720px) { .container { padding: 0 16px; } }

  /* Card pill */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--pill-bg);
    color: var(--pill-fg);
    font-size: 13px;
    font-weight: 500;
  }

  /* Hashtag chip styled like reference */
  .hashtag {
    display: inline-block;
    padding: 8px 14px;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    background: var(--paper);
    color: var(--ink);
    transition: all 0.2s ease;
  }
  .hashtag:hover { background: var(--ink); color: var(--paper); transform: translateY(-2px); }

  .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.2,0.8,0.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 5px; }

  /* Module card — the reference uses a unified card pattern */
  .module {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 22px;
    padding: 24px;
  }
  .module-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
  }
  .module-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .chev {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
</style>
